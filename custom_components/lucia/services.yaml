send_message:
  name: Send Message
  description: Send a message to the Lucia agent and receive a response.
  fields:
    message:
      name: Message
      description: The message text to send to the Lucia agent.
      required: true
      example: "Turn on the living room lights"
      selector:
        text:
          multiline: true

generate_image:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: lucia
    prompt:
      required: true
      selector:
        text:
          multiline: true
    size:
      required: false
      example: "1024x1024"
      default: "1024x1024"
      selector:
        select:
          options:
            - "1024x1024"
            - "1024x1792"
            - "1792x1024"
    quality:
      required: false
      example: "standard"
      default: "standard"
      selector:
        select:
          options:
            - "standard"
            - "hd"
    style:
      required: false
      example: "vivid"
      default: "vivid"
      selector:
        select:
          options:
            - "vivid"
            - "natural"
generate_content:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: lucia
    prompt:
      required: true
      selector:
        text:
          multiline: true
      example: "Hello, how can I help you?"
    filenames:
      selector:
        text:
          multiline: true
      example: |
        - /path/to/file1.txt
        - /path/to/file2.txt