<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    extend: {

        bg:        'var(--c-bg)',
        surface:   'var(--c-surface)',
        surface2:  'var(--c-surface2)',
        surface3:  'var(--c-surface3)',
        brd:       'var(--c-border)',
        accent:    'var(--c-accent)',
        'accent-s':'var(--c-accent-soft)',
      },
      textColor: {

        skin2:     'var(--c-text2)',
        skin3:     'var(--c-text3)',
      },
      fontFamily: {
        sans: ['"SF Pro Display"', '"Segoe UI"', 'system-ui', '-apple-system', 'sans-serif'],

    }
  }

<style>
  :root {
    --c-bg: #fafaf9; --c-surface: #ffffff; --c-surface2: #f5f5f4; --c-surface3: #e7e5e4;
    --c-border: #d6d3d1; --c-text: #1c1917; --c-text2: #57534e; --c-text3: #a8a29e;
    --c-accent: #0e7490; --c-accent-soft: rgba(14,116,144,0.08);
    --c-pass: #059669; --c-fail: #dc2626; --c-warn: #d97706;
    --c-glass: rgba(255,255,255,0.55); --c-glow: rgba(14,116,144,0.15);
  }
  .dark {
    --c-bg: #0a0a0b; --c-surface: #141416; --c-surface2: #1e1e21; --c-surface3: #2a2a2e;
    --c-border: rgba(63,63,70,0.45); --c-text: #ececef; --c-text2: #9c9ca4; --c-text3: #5a5a63;
    --c-accent: #22d3ee; --c-accent-soft: rgba(34,211,238,0.07);
    --c-pass: #34d399; --c-fail: #f87171; --c-warn: #fbbf24;
    --c-glass: rgba(20,20,22,0.7); --c-glow: rgba(34,211,238,0.08);
  }

  body {
    background: var(--c-bg); color: var(--c-text);
    font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  }
  /* dot grid overlay */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, var(--c-border) 0.7px, transparent 0.7px);
    background-size: 28px 28px; opacity: 0.3;
  }

  .card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 12px; position: relative; z-index: 1;
  }
  .card-glow {
    box-shadow: 0 0 32px var(--c-glow), 0 1px 3px rgba(0,0,0,0.12);
  }
  .card-inner { padding: 1.25rem 1.5rem; }

  /* header gradient line */
  .hdr-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 5%, var(--c-accent) 50%, transparent 95%);
    opacity: 0.35;
  }

  /* tab buttons */
  .tab-btn {
    padding: 0.4rem 1rem; border-radius: 8px; font-weight: 500; font-size: 0.8125rem;
    color: var(--c-text2); transition: all 0.15s ease; white-space: nowrap;
    letter-spacing: 0.01em; cursor: pointer; border: 1px solid transparent;
    background: transparent;
  }
  .tab-btn:hover { color: var(--c-text); background: var(--c-accent-soft); }
  .tab-btn.active {
    color: var(--c-accent); background: var(--c-accent-soft);
    border-color: var(--c-accent); border-color: color-mix(in srgb, var(--c-accent) 30%, transparent);
  }

  /* tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: panelIn 0.25s ease both; }
  @keyframes panelIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* accordion */
  .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .acc-body.open { max-height: 50000px; }
  .acc-chevron { transition: transform 0.2s ease; }
  .acc-chevron.open { transform: rotate(90deg); }

  /* badges */
  .badge-pass { background: color-mix(in srgb, var(--c-pass) 15%, transparent); color: var(--c-pass); }
  .badge-fail { background: color-mix(in srgb, var(--c-fail) 15%, transparent); color: var(--c-fail); }
  .badge-warn { background: color-mix(in srgb, var(--c-warn) 15%, transparent); color: var(--c-warn); }

  /* heatmap cell */
  .heat-cell {
    border-radius: 8px; padding: 0.5rem; text-align: center;
    font-weight: 600; font-size: 0.875rem; font-variant-numeric: tabular-nums;
    transition: transform 0.15s ease, box-shadow 0.15s ease; cursor: default;
  }
  .heat-cell:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 2; }

  /* latency bars */
  .lat-bar {
    height: 26px; border-radius: 6px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
  }

  /* conversation bubbles */
  .msg-user   { background: color-mix(in srgb, #3b82f6 12%, var(--c-surface2)); border-left: 3px solid #3b82f6; }
  .msg-asst   { background: color-mix(in srgb, var(--c-pass) 10%, var(--c-surface2)); border-left: 3px solid var(--c-pass); }
  .msg-tool   { background: color-mix(in srgb, var(--c-warn) 10%, var(--c-surface2)); border-left: 3px solid var(--c-warn); }
  .msg-system { background: var(--c-surface2); border-left: 3px solid var(--c-text3); opacity: 0.7; }

  /* sortable headers */
  .sort-hdr { cursor: pointer; user-select: none; white-space: nowrap; }
  .sort-hdr:hover { color: var(--c-accent); }

  /* stagger animation */
  .stagger > * { animation: staggerIn 0.35s ease both; }
  .stagger > *:nth-child(1) { animation-delay: 0.04s; }
  .stagger > *:nth-child(2) { animation-delay: 0.08s; }
  .stagger > *:nth-child(3) { animation-delay: 0.12s; }
  .stagger > *:nth-child(4) { animation-delay: 0.16s; }
  .stagger > *:nth-child(5) { animation-delay: 0.20s; }
  .stagger > *:nth-child(6) { animation-delay: 0.24s; }
  @keyframes staggerIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--c-text3); }

  /* theme toggle */
  .theme-toggle {
    width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center;
    justify-content: center; border: 1px solid var(--c-border); background: var(--c-surface);
    cursor: pointer; transition: all 0.15s ease; font-size: 1rem;
  }
  .theme-toggle:hover { border-color: var(--c-accent); background: var(--c-accent-soft); }

  @media print { body::before { display: none; } .tab-panel { display: block !important; } }
</style>
</head>

<!-- ═══════════════ MAIN CONTENT ═══════════════ -->

function scoreHsl(score, alpha=1) {
  if (score == null) return 'transparent';
  const s = Math.max(0, Math.min(100, score));
  // RGB interpolation between hand-picked color stops for maximum perceptual contrast
  const stops = [
    { at:0,   r:153, g:27,  b:27  },  // #991b1b  deep red
    { at:25,  r:194, g:65,  b:12  },  // #c2410c  orange-red
    { at:50,  r:180, g:130, b:15  },  // amber
    { at:75,  r:21,  g:148, b:61  },  // #15943d  green
    { at:100, r:5,   g:150, b:105 },  // #059669  emerald

  let lo = stops[0], hi = stops[stops.length-1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (s >= stops[i].at && s <= stops[i+1].at) { lo = stops[i]; hi = stops[i+1]; break; }

function allModelNames() {

function modelSummaries() {
  const map = {};
  (data.agents||[]).forEach(a => (a.models||[]).forEach(m => {
    if (!map[m.modelName]) map[m.modelName] = { scores: [], latencies: [], name: m.modelName, passed: 0, total: 0 };
    map[m.modelName].scores.push(m.overallScore ?? 0);
    map[m.modelName].latencies.push(m.performance?.meanLatencyMs ?? 0);
    map[m.modelName].passed += m.passedCount ?? 0;
    map[m.modelName].total  += m.testCaseCount ?? 0;
  }));

    v.avgScore   = v.scores.reduce((a,b)=>a+b,0) / v.scores.length;
    v.avgLatency = v.latencies.reduce((a,b)=>a+b,0) / v.latencies.length;
  });
  return map;
}

  const m = modelSummaries();

  (data.agents||[]).forEach(a=>(a.models||[]).forEach(m=>{
    tests += m.testCaseCount??0; passed += m.passedCount??0;
  }));
  return { tests, passed, failed: tests - passed };
}

function switchTab(id) {
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  $$('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-'+id));
  if (!rendered[id]) { renderTab(id); rendered[id] = true; }
}

function renderTab(id) {
  const fn = { summary: renderSummary, agents: renderAgents, traces: renderTraces, comparison: renderComparison };
  if (fn[id]) fn[id]();
}

const sortStates = {};

function renderAgents() {
  const agents = data.agents || [];

  let html = `<div class="space-y-4 stagger">`;

   agents.forEach((agent, ai) => {

      <button class="w-full card-inner flex items-center justify-between text-left" data-acc="agent-${ai}">
        <div class="flex items-center gap-3">
          <svg class="acc-chevron open w-4 h-4 shrink-0" style="color:var(--c-text3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
          <div>
            <h3 class="font-semibold text-sm">${esc(agent.agentName)}</h3>
            <p class="text-[11px]" style="color:var(--c-text3)">${(agent.models||[]).length} model(s) tested</p>
          </div>
        </div>
        <div class="flex items-center gap-4 text-xs font-mono">
          ${(agent.models||[]).map(m => `
            <span class="px-2 py-0.5 rounded" style="background:${scoreHsl(m.overallScore,0.2)};color:${scoreHsl(m.overallScore,1)}">${esc(m.modelName)} ${fmtNum(m.overallScore,1)}</span>
          `).join('')}
        </div>
      </button>
      <div class="acc-body open" id="acc-agent-${ai}">
        <div class="px-6 pb-5">
          ${renderAgentModels(agent, ai)}
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  $('#tab-agents').innerHTML = html;
}

function renderAgentModels(agent, ai) {
  return (agent.models||[]).map((model, mi) => {
    const pr = model.performance || {};
    const tc = model.testCases || [];
    const passRate = model.testCaseCount ? ((model.passedCount / model.testCaseCount) * 100) : 0;

    return `
    <div class="mt-4 ${mi > 0 ? 'pt-4' : ''}" ${mi > 0 ? 'style="border-top:1px solid var(--c-border)"' : ''}>
      <div class="flex items-center justify-between mb-3">
        <h4 class="font-mono font-semibold text-sm">${esc(model.modelName)}</h4>
        <span class="text-xs font-mono" style="color:var(--c-text2)">${model.passedCount ?? 0}/${model.testCaseCount ?? 0} passed</span>
      </div>

      <!-- Scores row -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 mb-4">
        ${[
          ['Overall', model.overallScore],
          ['Tool Select', model.toolSelectionScore],
          ['Tool Success', model.toolSuccessScore],
          ['Tool Efficiency', model.toolEfficiencyScore],
          ['Task Completion', model.taskCompletionScore],
          ['Pass Rate', passRate],
        ].map(([label, val]) => `
          <div class="rounded-lg px-3 py-2 text-center" style="background:var(--c-surface2)">
            <div class="text-lg font-bold font-mono" style="color:${scoreHsl(val,1)}">${fmtNum(val,1)}</div>
            <div class="text-[10px] uppercase tracking-wider mt-0.5" style="color:var(--c-text3)">${label}</div>
          </div>
        `).join('')}
      </div>

      <!-- Latency metrics -->
      <div class="flex flex-wrap gap-x-5 gap-y-1 text-xs mb-4" style="color:var(--c-text2)">
        <span>Mean: <b class="font-mono">${fmtMs(pr.meanLatencyMs)}</b></span>
        <span>Median: <b class="font-mono">${fmtMs(pr.medianLatencyMs)}</b></span>
        <span>P95: <b class="font-mono">${fmtMs(pr.p95LatencyMs)}</b></span>
        <span>Min: <b class="font-mono">${fmtMs(pr.minLatencyMs)}</b></span>
        <span>Max: <b class="font-mono">${fmtMs(pr.maxLatencyMs)}</b></span>
      </div>

      <!-- Test cases table -->
      ${tc.length ? `
      <div class="overflow-x-auto rounded-lg" style="border:1px solid var(--c-border)">
        <table class="w-full text-xs">
          <thead>
            <tr style="background:var(--c-surface2)">
              <th class="sort-hdr text-left px-3 py-2 font-semibold" data-sort="${ai}-${mi}-id">Test Case</th>
              <th class="sort-hdr text-center px-3 py-2 font-semibold" data-sort="${ai}-${mi}-passed">Result</th>
              <th class="sort-hdr text-right px-3 py-2 font-semibold" data-sort="${ai}-${mi}-score">Score</th>
              <th class="sort-hdr text-right px-3 py-2 font-semibold" data-sort="${ai}-${mi}-latencyMs">Latency</th>
              <th class="text-left px-3 py-2 font-semibold" style="color:var(--c-text3)">Failure Reason</th>
            </tr>
          </thead>
          <tbody id="tbody-${ai}-${mi}">
            ${renderTestRows(tc)}
          </tbody>
        </table>
      </div>` : '<p class="text-xs" style="color:var(--c-text3)">No test cases</p>'}
    </div>`;
  }).join('');
}

function renderTestRows(cases) {
  return cases.map(tc => {
    const passed = tc.passed;
    return `<tr class="hover:bg-[var(--c-surface2)] transition-colors" style="border-top:1px solid var(--c-border)">
      <td class="px-3 py-2 font-mono">${esc(tc.id)}</td>
      <td class="px-3 py-2 text-center">
        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-semibold ${passed ? 'badge-pass' : 'badge-fail'}">
          ${passIcon(passed)} ${passed ? 'PASS' : 'FAIL'}
        </span>
      </td>
      <td class="px-3 py-2 text-right font-mono font-medium" style="color:${scoreHsl(tc.score,1)}">${fmtNum(tc.score,1)}</td>
      <td class="px-3 py-2 text-right font-mono" style="color:var(--c-text2)">${fmtMs(tc.latencyMs)}</td>
      <td class="px-3 py-2 max-w-xs truncate" title="${esc(tc.failureReason)}" style="color:var(--c-fail)">${tc.failureReason ? esc(tc.failureReason) : '<span style="color:var(--c-text3)">—</span>'}</td>
    </tr>`;
  }).join('');
}

function handleSort(key) {
  // key format: "agentIdx-modelIdx-field"
  const [ai, mi, field] = key.split('-');
  const agent = data.agents[+ai];
  const model = agent?.models?.[+mi];
  if (!model?.testCases) return;

  const prev = sortStates[key];
  const dir = prev === 'asc' ? 'desc' : 'asc';
  sortStates[key] = dir;

  // Update sort indicators
  $$(`[data-sort^="${ai}-${mi}-"]`).forEach(el => {
    el.textContent = el.textContent.replace(/ [▲▼]/, '');
    if (el.dataset.sort === `${ai}-${mi}-${field}`) {
      el.textContent += dir === 'asc' ? ' ▲' : ' ▼';
    }
  });

  const sorted = [...model.testCases].sort((a,b) => {
    let va = a[field], vb = b[field];
    if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return dir === 'asc' ? (va??0)-(vb??0) : (vb??0)-(va??0);
  });
  const tbody = $(`#tbody-${ai}-${mi}`);
  if (tbody) tbody.innerHTML = renderTestRows(sorted);
}

// ═════════════════════════════════════════════════════════════════════════
// TAB 3: CONVERSATION TRACES
// ═════════════════════════════════════════════════════════════════════════
function renderTraces() {
  const agents = data.agents || [];
  const models = allModelNames();

  let html = `
  <div class="flex flex-wrap items-center gap-3 mb-6 stagger">
    <label class="text-xs font-semibold uppercase tracking-widest" style="color:var(--c-text3)">Filter</label>
    <select id="trace-agent" class="text-sm rounded-lg px-3 py-1.5 font-mono" style="background:var(--c-surface);border:1px solid var(--c-border);color:var(--c-text)">
      <option value="__all__">All Agents</option>
      ${agents.map(a => `<option value="${esc(a.agentName)}">${esc(a.agentName)}</option>`).join('')}
    </select>
    <select id="trace-model" class="text-sm rounded-lg px-3 py-1.5 font-mono" style="background:var(--c-surface);border:1px solid var(--c-border);color:var(--c-text)">
      <option value="__all__">All Models</option>
      ${models.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('')}
    </select>
    <span id="trace-count" class="text-xs ml-auto" style="color:var(--c-text3)"></span>
  </div>
  <div id="trace-list" class="space-y-3"></div>`;

  $('#tab-traces').innerHTML = html;
  $('#trace-agent').addEventListener('change', filterTraces);
  $('#trace-model').addEventListener('change', filterTraces);
  filterTraces();
}

function filterTraces() {
  const agentFilter = $('#trace-agent').value;
  const modelFilter = $('#trace-model').value;
  const agents = data.agents || [];

  let items = [];
  agents.forEach(a => {
    if (agentFilter !== '__all__' && a.agentName !== agentFilter) return;
    (a.models||[]).forEach(m => {
      if (modelFilter !== '__all__' && m.modelName !== modelFilter) return;
      (m.testCases||[]).forEach(tc => {
        items.push({ agent: a.agentName, model: m.modelName, tc });
      });
    });
  });

  $('#trace-count').textContent = `${items.length} test case${items.length !== 1 ? 's' : ''}`;

  if (!items.length) {
    $('#trace-list').innerHTML = emptyState('No matching test cases');
    return;
  }

  $('#trace-list').innerHTML = items.map((item, i) => {
    const tc = item.tc;
    const conv = tc.conversation || [];
    return `
    <div class="card overflow-hidden">
      <button class="w-full card-inner flex items-center justify-between text-left" data-acc="trace-${i}">
        <div class="flex items-center gap-3">
          <svg class="acc-chevron w-4 h-4 shrink-0" style="color:var(--c-text3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
          <div class="flex items-center gap-2 flex-wrap">
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-semibold ${tc.passed ? 'badge-pass' : 'badge-fail'}">
              ${passIcon(tc.passed)} ${tc.passed ? 'PASS' : 'FAIL'}
            </span>
            <span class="font-mono text-sm font-medium">${esc(tc.id)}</span>
            <span class="text-[11px] px-1.5 py-0.5 rounded" style="background:var(--c-surface2);color:var(--c-text3)">${esc(item.agent)}</span>
            <span class="text-[11px] px-1.5 py-0.5 rounded font-mono" style="background:var(--c-accent-soft);color:var(--c-accent)">${esc(item.model)}</span>
          </div>
        </div>
        <div class="flex items-center gap-3 text-xs shrink-0 ml-4">
          <span class="font-mono" style="color:${scoreHsl(tc.score,1)}">${fmtNum(tc.score,1)}</span>
          <span class="font-mono" style="color:var(--c-text3)">${fmtMs(tc.latencyMs)}</span>
        </div>
      </button>
      <div class="acc-body" id="acc-trace-${i}">
        <div class="px-5 pb-5">
          ${tc.failureReason ? `<div class="mb-3 text-xs px-3 py-2 rounded-lg badge-fail">${esc(tc.failureReason)}</div>` : ''}
          <div class="space-y-2 max-w-2xl">
            ${conv.map(msg => renderMessage(msg)).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderMessage(msg) {
  const role = (msg.role||'').toLowerCase();

  if (role === 'system') {
    return `<div class="msg-system rounded-lg px-3 py-2 text-xs italic" style="color:var(--c-text3)">
      <span class="font-semibold not-italic uppercase text-[10px] tracking-wider">System</span>
      <div class="mt-1">${esc(msg.content)}</div>
    </div>`;
  }

  if (role === 'user') {
    return `<div class="msg-user rounded-lg px-4 py-2.5 text-sm max-w-[85%]">
      <div class="font-semibold text-[10px] uppercase tracking-wider mb-1" style="color:#60a5fa">User</div>
      <div>${esc(msg.content)}</div>
    </div>`;
  }

  if (role === 'assistant') {
    let parts = '';
    if (msg.toolCalls && msg.toolCalls.length) {
      parts += msg.toolCalls.map(tc => {
        let argsStr = '';
        if (tc.arguments) {
          try {
            const obj = typeof tc.arguments === 'string' ? JSON.parse(tc.arguments) : tc.arguments;
            argsStr = JSON.stringify(obj, null, 2);
          } catch { argsStr = String(tc.arguments); }
        }
        return `<div class="msg-tool rounded-lg px-4 py-2.5 text-sm max-w-[85%] ml-auto">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-[10px] uppercase tracking-wider font-semibold" style="color:var(--c-warn)">Tool Call</span>
            <span class="font-mono font-bold text-xs" style="color:var(--c-warn)">${esc(tc.name)}</span>
          </div>
          ${argsStr ? `<pre class="text-[11px] font-mono mt-1 p-2 rounded overflow-x-auto" style="background:var(--c-surface);color:var(--c-text2)">${esc(argsStr)}</pre>` : ''}
        </div>`;
      }).join('');
    }
    if (msg.content) {
      parts += `<div class="msg-asst rounded-lg px-4 py-2.5 text-sm max-w-[85%] ml-auto">
        <div class="font-semibold text-[10px] uppercase tracking-wider mb-1" style="color:var(--c-pass)">Assistant</div>
        <div>${esc(msg.content)}</div>
      </div>`;
    }
    return parts || `<div class="msg-asst rounded-lg px-4 py-2.5 text-xs ml-auto" style="color:var(--c-text3)"><em>Empty response</em></div>`;
  }

  if (role === 'tool') {
    return `<div class="msg-tool rounded-lg px-4 py-2.5 text-sm max-w-[85%]" style="border-left-color: color-mix(in srgb, var(--c-warn) 50%, var(--c-border));">
      <div class="font-semibold text-[10px] uppercase tracking-wider mb-1" style="color:var(--c-warn);opacity:0.7">Tool Result</div>
      <div class="font-mono text-xs" style="color:var(--c-text2)">${esc(msg.content)}</div>
    </div>`;
  }

  return `<div class="rounded-lg px-3 py-2 text-xs" style="background:var(--c-surface2);color:var(--c-text3)">[${esc(role)}] ${esc(msg.content)}</div>`;
}

// ═════════════════════════════════════════════════════════════════════════
// TAB 4: MODEL COMPARISON
// ═════════════════════════════════════════════════════════════════════════
function renderComparison() {
  const agents = data.agents || [];
  if (!agents.length) { $('#tab-comparison').innerHTML = emptyState('No agent data'); return; }

  const metrics = [
    { key: 'overallScore',        label: 'Overall',        higher: true },
    { key: 'toolSelectionScore',  label: 'Tool Select',    higher: true },
    { key: 'toolSuccessScore',    label: 'Tool Success',   higher: true },
    { key: 'toolEfficiencyScore', label: 'Tool Efficiency',higher: true },
    { key: 'taskCompletionScore', label: 'Task Completion',higher: true },
    { key: '_passRate',           label: 'Pass Rate',      higher: true },
    { key: '_meanLatency',        label: 'Mean Latency',   higher: false },
  ];

  let html = `<div class="space-y-6 stagger">`;

  agents.forEach(agent => {
    const models = agent.models || [];
    if (models.length < 1) return;

    // Augment models with computed fields
    const augmented = models.map(m => ({
      ...m,
      _passRate: m.testCaseCount ? (m.passedCount / m.testCaseCount) * 100 : 0,
      _meanLatency: m.performance?.meanLatencyMs ?? 0,
    }));

    // Find best for each metric
    const best = {};
    metrics.forEach(met => {
      const vals = augmented.map(m => m[met.key] ?? 0);
      best[met.key] = met.higher ? Math.max(...vals) : Math.min(...vals);
    });

    // Compute deltas
    const rows = augmented.map(m => {
      const deltas = {};
      metrics.forEach(met => {
        const val = m[met.key] ?? 0;
        deltas[met.key] = met.higher ? (best[met.key] - val) : (val - best[met.key]);
      });
      return { name: m.modelName, deltas, model: m };
    });

    // Max delta per metric (for color normalization)
    const maxDelta = {};
    metrics.forEach(met => {
      maxDelta[met.key] = Math.max(...rows.map(r => Math.abs(r.deltas[met.key])), 0.001);
    });

    html += `<div class="card card-inner">
      <h3 class="font-semibold text-sm mb-4">${esc(agent.agentName)} — <span style="color:var(--c-text2)">Delta from Best</span></h3>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr style="background:var(--c-surface2)">
              <th class="text-left px-3 py-2 font-semibold">Model</th>
              ${metrics.map(met => `<th class="text-right px-3 py-2 font-semibold">${met.label}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr style="border-top:1px solid var(--c-border)">
                <td class="px-3 py-2 font-mono font-medium">${esc(r.name)}</td>
                ${metrics.map(met => {
                  const d = r.deltas[met.key];
                  const norm = maxDelta[met.key] > 0 ? Math.abs(d) / maxDelta[met.key] : 0;
                  const bg = d === 0 ? scoreHsl(100, 0.2) : scoreHsl(100 - norm * 100, 0.2);
                  const fg = d === 0 ? scoreHsl(100, 1) : scoreHsl(100 - norm * 100, 1);
                  const prefix = d === 0 ? '' : (met.higher ? '-' : '+');
                  const unit = met.key === '_meanLatency' ? 'ms' : '';
                  const displayVal = met.key === '_meanLatency' ? fmtNum(d, 0) : fmtNum(d, 1);
                  return `<td class="px-3 py-2 text-right font-mono" style="background:${bg};color:${fg}">
                    ${d === 0 ? '<span class="font-bold">★ best</span>' : prefix + displayVal + unit}
                  </td>`;
                }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ${models.length < 2 ? '<p class="mt-3 text-[11px]" style="color:var(--c-text3)">Single model — comparison requires 2+ models</p>' : ''}
    </div>`;
  });

  // Cross-agent aggregate
  const allModels = allModelNames();
  if (agents.length > 1 && allModels.length > 1) {
    const summ = modelSummaries();
    const bestAvg = Math.max(...Object.values(summ).map(s=>s.avgScore));
    const fastAvg = Math.min(...Object.values(summ).map(s=>s.avgLatency));

    html += `<div class="card card-inner">
      <h3 class="font-semibold text-sm mb-4">Cross-Agent Aggregate</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr style="background:var(--c-surface2)">
              <th class="text-left px-3 py-2 font-semibold">Model</th>
              <th class="text-right px-3 py-2 font-semibold">Avg Score</th>
              <th class="text-right px-3 py-2 font-semibold">Δ Score</th>
              <th class="text-right px-3 py-2 font-semibold">Avg Latency</th>
              <th class="text-right px-3 py-2 font-semibold">Δ Latency</th>
              <th class="text-right px-3 py-2 font-semibold">Pass Rate</th>
            </tr>
          </thead>
          <tbody>
            ${Object.values(summ).sort((a,b)=>b.avgScore-a.avgScore).map(m => {
              const dScore = bestAvg - m.avgScore;
              const dLat = m.avgLatency - fastAvg;
              return `<tr style="border-top:1px solid var(--c-border)">
                <td class="px-3 py-2 font-mono font-medium">${esc(m.name)}</td>
                <td class="px-3 py-2 text-right font-mono" style="color:${scoreHsl(m.avgScore,1)}">${fmtNum(m.avgScore,1)}</td>
                <td class="px-3 py-2 text-right font-mono" style="color:${dScore===0?scoreHsl(100,1):scoreHsl(50,1)}">${dScore===0?'★ best':'-'+fmtNum(dScore,1)}</td>
                <td class="px-3 py-2 text-right font-mono" style="color:var(--c-text2)">${fmtMs(m.avgLatency)}</td>
                <td class="px-3 py-2 text-right font-mono" style="color:${dLat<1?scoreHsl(100,1):scoreHsl(50,1)}">${dLat<1?'★ best':'+'+fmtMs(dLat)}</td>
                <td class="px-3 py-2 text-right font-mono">${m.total?fmtNum((m.passed/m.total)*100,1)+'%':'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  html += `</div>`;
  $('#tab-comparison').innerHTML = html;
}

// ═════════════════════════════════════════════════════════════════════════
// SHARED
// ═════════════════════════════════════════════════════════════════════════
function emptyState(msg) {
  return `<div class="card card-inner text-center py-12">
    <div class="text-3xl mb-2" style="color:var(--c-text3)">∅</div>
    <p class="text-sm" style="color:var(--c-text3)">${esc(msg)}</p>
  </div>`;
}

// ═════════════════════════════════════════════════════════════════════════
// EVENT HANDLING & INIT
// ═════════════════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  // Tab switching
  const tabBtn = e.target.closest('[data-tab]');
  if (tabBtn && tabBtn.classList.contains('tab-btn')) {
    switchTab(tabBtn.dataset.tab);
    return;
  }

  // Accordion toggle
  const accBtn = e.target.closest('[data-acc]');
  if (accBtn) {
    const id = accBtn.dataset.acc;
    const body = document.getElementById('acc-' + id);
    const chev = accBtn.querySelector('.acc-chevron');
    if (body) body.classList.toggle('open');
    if (chev) chev.classList.toggle('open');
    return;
  }

  // Sort headers
  const sortHdr = e.target.closest('[data-sort]');
  if (sortHdr) {
    handleSort(sortHdr.dataset.sort);
    return;
  }
});

function init() {
  initTheme();
  $('#theme-btn').addEventListener('click', toggleTheme);
  $('#hdr-run-id').textContent = data.runId ? `Run ${data.runId}` : '';
  renderSummary();
  rendered.summary = true;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
