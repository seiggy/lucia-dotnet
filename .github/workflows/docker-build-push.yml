name: Build and Push Docker Image

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'  # Semantic versioning (vX.Y.Z and vX.Y.Z-preview.N)
  pull_request:
    branches:
      - master
  # Wait for the asset image to be built before starting, when asset.lock changes
  workflow_run:
    workflows: ["Build Assets Image"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      preview:
        description: 'Build as preview (skips latest tag)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pull-requests: write
  security-events: write

env:
  ASSET_IMAGE: ghcr.io/${{ github.repository }}/build-assets

jobs:
  # ==========================================================================
  # Build all platform images using a matrix strategy
  # ==========================================================================
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    # When triggered by workflow_run (asset build finished), only proceed if it succeeded.
    # When triggered by push that changes asset.lock, skip — the workflow_run trigger
    # will pick it up after the asset image is ready.
    if: |
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      !(github.event_name == 'push' && contains(github.event.head_commit.modified, 'infra/docker/asset.lock'))
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: seiggy/lucia-agenthost
            dockerfile: ./infra/docker/Dockerfile
            title: Lucia Agent Host
            description: AI-powered Home Assistant agent orchestration
            platforms: linux/amd64
            cache_scope: lucia-agenthost
            tag_suffix: ""
          - image: seiggy/lucia-agenthost
            dockerfile: ./infra/docker/Dockerfile.voice
            title: Lucia Agent Host (Voice)
            platforms: linux/amd64
            cache_scope: lucia-agenthost-voice
            description: AI-powered Home Assistant agent with pre-loaded Wyoming voice models
            tag_suffix: "-voice"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute asset.lock hash
        id: asset-hash
        run: |
          HASH=$(sha256sum infra/docker/asset.lock | cut -c1-12)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Asset image tag: sha-$HASH"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Detect preview release
        id: preview
        run: |
          IS_PREVIEW=false
          VERSION_TAG=""
          REF_NAME="${{ github.ref_name }}"
          # Strip leading 'v' prefix from tag for Docker image tags
          VERSION="${REF_NAME#v}"
          if [[ "${{ github.ref_type }}" == "tag" && "$VERSION" == *"-preview"* ]]; then
            IS_PREVIEW=true
            VERSION_TAG="$VERSION"
          elif [[ "${{ inputs.preview }}" == "true" ]]; then
            IS_PREVIEW=true
            VERSION_TAG="0.0.0-preview.$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "is_preview=$IS_PREVIEW" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.tag_suffix }},enable=${{ github.ref_type == 'tag' && steps.preview.outputs.is_preview != 'true' }}
            type=raw,value=latest,enable=${{ matrix.tag_suffix == '' && github.event_name != 'pull_request' && steps.preview.outputs.is_preview != 'true' && (github.ref_type == 'tag' || github.ref == 'refs/heads/master') }}
            type=raw,value=voice,enable=${{ matrix.tag_suffix == '-voice' && github.event_name != 'pull_request' && steps.preview.outputs.is_preview != 'true' && (github.ref_type == 'tag' || github.ref == 'refs/heads/master') }}
            type=ref,event=branch,suffix=${{ matrix.tag_suffix }}
            type=ref,event=pr,suffix=${{ matrix.tag_suffix }}
            type=sha,prefix=sha-,suffix=${{ matrix.tag_suffix }}
            type=raw,value=${{ steps.preview.outputs.version_tag }}${{ matrix.tag_suffix }},enable=${{ github.event_name == 'workflow_dispatch' && steps.preview.outputs.is_preview == 'true' && steps.preview.outputs.version_tag != '' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=Lucia Project
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.cache_scope }}
            type=registry,ref=${{ matrix.image }}:${{matrix.cache_scope}}-buildcache
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max
          build-args: |
            ASSET_IMAGE=${{ env.ASSET_IMAGE }}:sha-${{ steps.asset-hash.outputs.hash }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Image digest
        run: echo "${{ matrix.image }}@${{ steps.build-push.outputs.digest }}"

  # ==========================================================================
  # Security scan on push to main
  # ==========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: seiggy/lucia-agenthost:voice
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
