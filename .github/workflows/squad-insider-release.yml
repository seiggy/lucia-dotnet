name: Squad Insider Release
# dotnet project — configure build, test, and insider release commands below

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'  # Semantic version tags (matches docker-build-push.yml)

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore lucia-dotnet.slnx

      - name: Build
        run: dotnet build lucia-dotnet.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test lucia.Tests --no-build --configuration Release --filter "Category!=Eval&Category!=Integration" --logger "console;verbosity=normal"

      - name: Test EvalHarness (provider-free)
        run: dotnet test lucia.EvalHarness.Tests --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Create insider pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != *-preview* && "$VERSION" != *-insider* ]]; then
            echo "ℹ️ $VERSION is a stable tag — handled by squad-release.yml"
            exit 0
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "ℹ️ Pre-release $VERSION already exists — skipping (idempotent)"
          else
            gh release create "$VERSION" --generate-notes --prerelease
            echo "✅ Created insider pre-release $VERSION"
          fi
