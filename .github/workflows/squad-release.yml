name: Squad Release
# dotnet project — configure build, test, and release commands below

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'  # Semantic version tags (matches docker-build-push.yml)
      - '!v*-*'                   # Exclude prerelease/suffixed tags at trigger level; runtime guard below enforces exact semver

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore lucia-dotnet.slnx

      - name: Build
        run: dotnet build lucia-dotnet.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test lucia.Tests --no-build --configuration Release --filter "Category!=Eval&Category!=Integration" --logger "console;verbosity=normal"

      - name: Test EvalHarness (provider-free)
        run: dotnet test lucia.EvalHarness.Tests --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          # Require exact vMAJOR.MINOR.PATCH — no suffix, no prerelease, no malformed tags
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ℹ️ $VERSION is not a stable release tag — skipping"
            exit 0
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "ℹ️ Release $VERSION already exists — skipping (idempotent)"
          else
            gh release create "$VERSION" --generate-notes --latest
            echo "✅ Created release $VERSION"
          fi
