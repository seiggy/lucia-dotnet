name: Squad CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore lucia-dotnet.slnx

      - name: Build
        run: dotnet build lucia-dotnet.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test lucia.Tests --no-build --configuration Release --logger "console;verbosity=normal"
