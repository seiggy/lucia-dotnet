name: Squad Promote

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would happen without pushing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  dev-to-preview:
    name: Promote dev → preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state (dry run info)
        run: |
          echo "=== master HEAD ===" && git log origin/master -1 --oneline
          echo "=== Files that would be stripped ==="
          git ls-files | grep -E "^(\.(ai-team|squad|ai-team-templates)/|team-docs/|docs/proposals/)" || echo "(none)"

      - name: Merge master (strip forbidden paths)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout master
          echo "ℹ️ Using master branch (dev/preview branches do not exist)"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."

  preview-to-main:
    name: Promote preview → main (release)
    needs: dev-to-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state
        run: |
          echo "=== master HEAD ===" && git log origin/master -1 --oneline
          VERSION=$(grep -m1 "^# Release Notes" RELEASE_NOTES.md | sed 's/# Release Notes - //')
          echo "=== Version === $VERSION"

      - name: Validate master is release-ready
        run: |
          git checkout master
          VERSION=$(grep -m1 "^# Release Notes" RELEASE_NOTES.md | sed 's/# Release Notes - //')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from RELEASE_NOTES.md — ensure it starts with '# Release Notes - X.Y.Z'"
            exit 1
          fi
          echo "✅ Version $VERSION found in RELEASE_NOTES.md"

          # Verify no forbidden files on master
          FORBIDDEN=$(git ls-files | grep -E "^(\.(ai-team|squad|ai-team-templates)/|team-docs/|docs/proposals/)" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files found on master: $FORBIDDEN"
            exit 1
          fi
          echo "✅ No forbidden files on master"

      - name: Master is release-ready
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          echo "✅ master — squad-release.yml will tag and publish the release"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."
