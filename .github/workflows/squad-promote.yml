name: Squad Promote

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would happen without pushing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  dev-to-preview:
    name: Promote dev → preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state (dry run info)
        run: |
          echo "=== master HEAD ===" && git log origin/master -1 --oneline
          echo "=== Files that would be stripped ===" || true

      - name: Merge master (strip forbidden paths)
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git checkout master
          echo "ℹ️ Using master branch (dev/preview branches do not exist)"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."

  preview-to-main:
    name: Promote preview → main (release)
    needs: dev-to-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Show current state
        run: |
          echo "=== master HEAD ===" && git log origin/master -1 --oneline
          echo "=== Version ===" && node -e "console.log('v' + require('./package.json').version)"

      - name: Validate master is release-ready
        run: |
          git checkout master
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in CHANGELOG.md — update before releasing"
            exit 1
          fi
          echo "✅ Version $VERSION has CHANGELOG entry"

          # Verify no forbidden files on master
          FORBIDDEN=$(git ls-files | grep -E "^(\.(ai-team|squad|ai-team-templates)/|team-docs/|docs/proposals/)" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files found on master: $FORBIDDEN"
            exit 1
          fi
          echo "✅ No forbidden files on master"

      - name: Master is release-ready
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          echo "✅ master — squad-release.yml will tag and publish the release"

      - name: Dry run complete
        if: ${{ inputs.dry_run == 'true' }}
        run: echo "🔍 Dry run complete — no changes pushed."
