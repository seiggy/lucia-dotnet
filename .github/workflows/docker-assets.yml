name: Build Assets Image

# Builds and pushes the pre-downloaded binary assets OCI image to ghcr.io.
# Only triggers when asset.lock changes (or manually). The resulting image is
# referenced by all other Dockerfiles via COPY --from=.

on:
  push:
    branches: [master]
    paths:
      - 'infra/docker/asset.lock'
      - 'infra/docker/Dockerfile.assets'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if asset.lock has not changed'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  ASSET_IMAGE: ghcr.io/${{ github.repository }}/build-assets

jobs:
  build-assets:
    name: Build & Push Asset Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute asset.lock hash
        id: lock-hash
        run: |
          HASH=$(sha256sum infra/docker/asset.lock | cut -c1-12)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Asset lock hash: $HASH"

      - name: Check if image already exists
        id: check-existing
        if: inputs.force_rebuild != true
        run: |
          # Try to pull the manifest — if it exists, skip rebuild
          if docker manifest inspect "${{ env.ASSET_IMAGE }}:sha-${{ steps.lock-hash.outputs.hash }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Asset image sha-${{ steps.lock-hash.outputs.hash }} already exists — skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      - name: Log in to GitHub Container Registry
        if: steps.check-existing.outputs.exists != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.check-existing.outputs.exists != 'true'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        if: steps.check-existing.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push asset image
        if: steps.check-existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.assets
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ASSET_IMAGE }}:sha-${{ steps.lock-hash.outputs.hash }}
            ${{ env.ASSET_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=Lucia Build Assets
            org.opencontainers.image.description=Pre-downloaded binary assets for lucia Docker builds
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=build-assets
          cache-to: type=gha,scope=build-assets,mode=max

      - name: Output image reference
        run: |
          echo "### Asset Image Published 📦" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`sha-${{ steps.lock-hash.outputs.hash }}\` | \`${{ env.ASSET_IMAGE }}:sha-${{ steps.lock-hash.outputs.hash }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`latest\` | \`${{ env.ASSET_IMAGE }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
