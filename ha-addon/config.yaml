# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Lucia Voice Assistant
description: Privacy-first multi-agent assistant for Home Assistant
version: "1.2.0"
slug: lucia-agent
url: "https://github.com/seiggy/lucia-dotnet/tree/main/ha-addon"
arch:
  - amd64
ports:
  8099/tcp: 8099
  10400/tcp: 10400
ports_description:
  8099/tcp: "Web API and Dashboard"
  10400/tcp: "Wyoming Voice Protocol"
map:
  - type: data
    path: /data
    read_only: False
  - type: data
    path: /app/models
    read_only: False
  - type: data
    path: /app/plugins
    read_only: False
options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
schema:
  ha_url: url
  ha_token: password
image: "hub.docker.com/r/seiggy/lucia-agent:ha"
webui: "[PROTO:option_name]://[HOST]:[PORT:8099]"
hassio_api: true
hassio_role: default
environment:
  - name: HomeAssistant__BaseUrl
    value: "http://supervisor"
  - name: HomeAssistant__AccessToken
    value: "$SUPERVISOR_TOKEN"
ingress: true